name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test library
        run: cargo test --locked

      - name: Test CLI feature
        run: cargo test --locked --features cli

      - name: Run benchmarks
        run: cargo bench --locked --bench resampler
