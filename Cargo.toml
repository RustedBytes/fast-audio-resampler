[package]
name = "fast-audio-resampler"
version = "0.1.0"
edition = "2024"

[features]
default = []
cli = ["dep:hound"]

[dependencies]
hound = { version = "3.5", optional = true }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "resampler"
harness = false

[[bin]]
name = "fast-audio-resampler"
path = "src/main.rs"
required-features = ["cli"]

[profile.release]
lto = "thin"
codegen-units = 1
